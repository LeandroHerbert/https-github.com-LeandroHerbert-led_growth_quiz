    <style>
      /* Faz as colunas do CRM (Dashboard.tsx:440) quebrarem linha em vez de exigir
         rolagem horizontal — arrastar-e-soltar não funciona bem com colunas fora da tela. */
      [data-loc="client/src/pages/Dashboard.tsx:440"] {
        overflow-x: visible !important;
        flex-wrap: wrap !important;
      }

      /* Botão "Baixar meu diagnóstico" (ResultDetails.tsx) está dando erro — removido a pedido. */
      [data-loc="client/src/pages/ResultDetails.tsx:563"] {
        display: none !important;
      }

      /* Abre espaço para o destaque do "presente surpresa" (inserido via script,
         por fora da árvore do React) não sobrepor o botão de WhatsApp abaixo. */
      [data-loc="client/src/pages/ResultDetails.tsx:521"] {
        margin-bottom: 76px !important;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script>
      // O drag-and-drop do CRM (Dashboard.tsx) não está soltando os cards nas colunas
      // corretamente. Este script adiciona um seletor de status ao lado de cada lead,
      // que chama a mesma API (quizLeads.atualizarStatus), sem depender do arrastar-e-soltar.
      (function () {
        var STATUSES = [
          ["novo", "Novo"],
          ["em_contato", "Em contato"],
          ["sessao_marcada", "Sessão marcada"],
          ["sessao_realizada", "Sessão realizada"],
          ["comprou", "Comprou"],
          ["nao_comprou", "Não comprou"],
        ];
        var leadsCache = [];
        var overlay = null;
        var updating = false;

        function ensureOverlay() {
          if (!overlay) {
            overlay = document.createElement("div");
            overlay.id = "status-mover-overlay";
            overlay.style.cssText = "position:absolute;top:0;left:0;width:0;height:0;z-index:99999;";
            document.body.appendChild(overlay);
          }
          return overlay;
        }

        function fetchLeads() {
          return fetch("/api/trpc/quizLeads.listar")
            .then(function (res) { return res.json(); })
            .then(function (data) {
              leadsCache = (data && data.result && data.result.data && data.result.data.json) || [];
            })
            .catch(function () {});
        }

        function updateStatus(id, crmStatus) {
          if (updating) return;
          updating = true;
          fetch("/api/trpc/quizLeads.atualizarStatus", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ json: { id: id, crmStatus: crmStatus } }),
          })
            .then(function () { window.location.reload(); })
            .catch(function () { updating = false; });
        }

        function sync() {
          var ov = ensureOverlay();
          // Só existe quando o card do lead está expandido (clicado)
          var expandedBlocks = document.querySelectorAll('[data-loc="client/src/pages/Dashboard.tsx:147"]');
          var seen = {};
          expandedBlocks.forEach(function (block) {
            var contactEl = block.querySelector('[data-loc="client/src/pages/Dashboard.tsx:159"]');
            var text = contactEl ? (contactEl.textContent || "") : "";
            var lead = null;
            for (var i = 0; i < leadsCache.length; i++) {
              var l = leadsCache[i];
              if (l.email && text.indexOf(l.email) !== -1) { lead = l; break; }
            }
            if (!lead) return;
            var key = "mover-" + lead.id;
            seen[key] = true;
            var box = document.getElementById(key);
            var rect = block.getBoundingClientRect();
            if (!box) {
              box = document.createElement("div");
              box.id = key;
              box.style.cssText =
                "position:absolute;pointer-events:auto;box-sizing:border-box;" +
                "background:rgba(0,0,0,0.3);border-top:1px solid rgba(57,255,20,0.15);" +
                "border-radius:0 0 10px 10px;padding:12px 14px;";

              var label = document.createElement("label");
              label.textContent = "MOVER LEAD PARA";
              label.style.cssText =
                "display:block;font-size:10px;font-weight:700;color:#8a9a8e;" +
                "letter-spacing:0.08em;margin-bottom:4px;";
              box.appendChild(label);

              var select = document.createElement("select");
              select.style.cssText =
                "width:100%;box-sizing:border-box;pointer-events:auto;font-size:13px;padding:8px 10px;" +
                "border-radius:6px;border:1px solid rgba(57,255,20,0.3);background:#0d2b14;" +
                "color:#39ff14;cursor:pointer;font-weight:600;";
              STATUSES.forEach(function (s) {
                var opt = document.createElement("option");
                opt.value = s[0];
                opt.textContent = s[1];
                select.appendChild(opt);
              });
              select.addEventListener("pointerdown", function (e) { e.stopPropagation(); });
              select.addEventListener("mousedown", function (e) { e.stopPropagation(); });
              select.addEventListener("click", function (e) { e.stopPropagation(); });
              select.addEventListener("change", function () { updateStatus(lead.id, select.value); });
              box.appendChild(select);
              ov.appendChild(box);
            }
            var select2 = box.querySelector("select");
            if (document.activeElement !== select2) select2.value = lead.crmStatus;
            box.style.top = rect.bottom + window.scrollY + "px";
            box.style.left = rect.left + window.scrollX + "px";
            box.style.width = rect.width + "px";
          });
          Array.prototype.slice.call(ov.children).forEach(function (child) {
            if (!seen[child.id]) child.remove();
          });
        }

        fetchLeads().then(sync);
        setInterval(function () {
          fetchLeads().then(sync);
        }, 1500);
        window.addEventListener("scroll", sync, true);
        window.addEventListener("resize", sync);
      })();
    </script>
    <script>
      // Destaque do "presente surpresa" na tela de resultado (ResultDetails.tsx),
      // inserido por fora da árvore do React (mesma técnica do seletor de status do CRM)
      // para não arriscar mexer no bundle compilado.
      (function () {
        var BANNER_ID = "presente-surpresa-banner";

        function sync() {
          var anchor = document.querySelector('[data-loc="client/src/pages/ResultDetails.tsx:521"]');
          var banner = document.getElementById(BANNER_ID);
          if (!anchor) {
            if (banner) banner.remove();
            return;
          }
          if (!banner) {
            banner = document.createElement("div");
            banner.id = BANNER_ID;
            banner.style.cssText =
              "position:absolute;pointer-events:none;box-sizing:border-box;" +
              "display:flex;align-items:center;gap:10px;" +
              "padding:12px 16px;border-radius:10px;" +
              "background:rgba(57,255,20,0.08);border:1px solid rgba(57,255,20,0.3);";

            var icon = document.createElement("div");
            icon.style.cssText = "flex-shrink:0;color:#39ff14;display:flex;";
            icon.innerHTML =
              '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' +
              '<polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/>' +
              '<line x1="12" y1="22" x2="12" y2="7"/>' +
              '<path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/>' +
              '<path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>';

            var text = document.createElement("p");
            text.style.cssText = "margin:0;color:#fff;font-size:13px;font-weight:700;line-height:1.4;text-align:left;";
            text.textContent = "Quem participar da reunião estratégica leva um presente surpresa.";

            banner.appendChild(icon);
            banner.appendChild(text);
            document.body.appendChild(banner);
          }
          var rect = anchor.getBoundingClientRect();
          banner.style.top = rect.bottom + window.scrollY + 14 + "px";
          banner.style.left = rect.left + window.scrollX + "px";
          banner.style.width = rect.width + "px";
        }

        sync();
        setInterval(sync, 800);
        window.addEventListener("scroll", sync, true);
        window.addEventListener("resize", sync);
      })();
    </script>
  </body>

</html>
